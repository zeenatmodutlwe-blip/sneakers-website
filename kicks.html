    </div>

</section>

              <script>
function showSneaker(category){

    let galleries = document.querySelectorAll('.sneaker-gallery');

    galleries.forEach(gallery => {
        gallery.style.display = 'none';
    });

    document.getElementById(category).style.display = 'flex';
}


</script>
